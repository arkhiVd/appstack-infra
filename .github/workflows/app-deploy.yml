name: App Build & Deploy

# =============================================================================
# Builds the 8 services + 2 workers, pushes them to ECR, and (optionally) rolls
# the ECS services to the new image.
#
# INERT BY DESIGN: triggers on workflow_dispatch only, so it cannot fire until
# you wire the secrets below. To enable full automation later, uncomment the
# `push:` block.
#
# Required before this works:
#   - secret AWS_DEPLOY_ROLE_ARN : an OIDC role with ECR push + ECS deploy perms.
#       Add a `deploy` role to the github_oidc module (trusted on push to main /
#       this workflow) — distinct from the gated apply role. NO environment gate,
#       so deploys are fully automated (no manual approval).
#   - the ecr_registry module's `repositories` var should list the ACTUAL app
#       services (auth, catalog, search, inventory, orders, notification,
#       suppliers, integration, search-sync-worker, pdf-ingest-worker). Until
#       then this workflow create-if-missing's each repo so it is self-contained.
#   - ECS services + task definitions per service (future ecs_compute work).
#       The deploy job is opt-in (run_deploy input) and no-ops the build otherwise.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Also roll ECS services to the new image (needs ECS services to exist)"
        type: boolean
        default: false
  # ---- enable later for push-to-deploy automation -------------------------
  # push:
  #   branches: [main]
  #   paths:
  #     - "app/**"
  #     - ".github/workflows/app-deploy.yml"

permissions:
  id-token: write     # OIDC federation to AWS
  contents: read

env:
  AWS_REGION: ap-south-1
  PROJECT: appstack
  ECS_CLUSTER: appstack-cluster   # align with the ecs_compute module's cluster name

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: auth,               context: app/services/auth-service }
          - { name: catalog,            context: app/services/catalog-service }
          - { name: search,             context: app/services/search-service }
          - { name: inventory,          context: app/services/inventory-service }
          - { name: orders,             context: app/services/orders-service }
          - { name: notification,       context: app/services/notification-service }
          - { name: suppliers,          context: app/services/suppliers-service }
          - { name: integration,        context: app/services/integration-service }
          - { name: search-sync-worker, context: app/services/search-sync-worker }
          - { name: pdf-ingest-worker,  context: app/services/pdf-ingest-worker }
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          REPO="${PROJECT}/${{ matrix.name }}"
          aws ecr describe-repositories --repository-names "$REPO" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$REPO" \
                 --image-scanning-configuration scanOnPush=true >/dev/null
          echo "repo: $REPO"

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${REGISTRY}/${PROJECT}/${{ matrix.name }}"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" "${{ matrix.context }}"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  deploy:
    needs: build-push
    if: ${{ inputs.run_deploy }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # service / container names must match what ecs_compute creates.
        name: [auth, catalog, search, inventory, orders, notification,
               suppliers, integration, search-sync-worker, pdf-ingest-worker]
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Pull the live task definition, swap in the new image, register a new
      # revision, and point the service at it. No task-def JSON kept in git.
      - name: Deploy new revision to ECS
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          SVC="${PROJECT}-${{ matrix.name }}"
          FAMILY="${PROJECT}-${{ matrix.name }}"
          IMAGE="${REGISTRY}/${PROJECT}/${{ matrix.name }}:${{ github.sha }}"

          TASKDEF=$(aws ecs describe-task-definition --task-definition "$FAMILY" \
            --query 'taskDefinition' --output json)

          NEW=$(echo "$TASKDEF" | jq --arg IMG "$IMAGE" '
            .containerDefinitions[0].image = $IMG
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)')

          ARN=$(aws ecs register-task-definition --cli-input-json "$NEW" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$SVC" \
            --task-definition "$ARN" >/dev/null

          echo "deployed $SVC -> $ARN"

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" \
            --services "${PROJECT}-${{ matrix.name }}"
