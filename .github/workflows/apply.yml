name: Terraform Apply

# GitOps: on merge to main (infra paths), provision the stack, push all images to
# ECR, then roll the ECS services so they pull the new images. One merge = full
# deploy. Gated by the "production" GitHub Environment (remove its required
# reviewer to make it fully auto).
on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "environments/**"
      - ".github/workflows/apply.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.9.5"
  WORKING_DIR: environments/dev
  AWS_REGION: ap-south-1
  PROJECT: appstack
  ECS_CLUSTER: appstack-cluster

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform apply -auto-approve -input=false -no-color

      - name: Deploy SPA to S3 + invalidate CloudFront
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          BUCKET=$(terraform output -raw admin_bucket_name)
          DIST=$(terraform output -raw admin_cloudfront_distribution_id)
          aws s3 sync ../../app/frontend "s3://$BUCKET/" --delete
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*" >/dev/null
          echo "SPA deployed to s3://$BUCKET, invalidated $DIST"

      - name: Show site URL
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "Admin panel: https://$(terraform output -raw admin_cloudfront_domain)"

  # Build + push all 10 images to the ECR repos terraform just created.
  build-push:
    needs: apply
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: auth,               context: app/services/auth-service,        dockerfile: app/services/auth-service/Dockerfile }
          - { name: catalog,            context: app/services/catalog-service,     dockerfile: app/services/catalog-service/Dockerfile }
          - { name: search,             context: app/services/search-service,      dockerfile: app/services/search-service/Dockerfile }
          - { name: inventory,          context: app/services/inventory-service,   dockerfile: app/services/inventory-service/Dockerfile }
          - { name: orders,             context: app/services/orders-service,      dockerfile: app/services/orders-service/Dockerfile }
          - { name: notification,       context: app/services/notification-service, dockerfile: app/services/notification-service/Dockerfile }
          - { name: suppliers,          context: app/services/suppliers-service,   dockerfile: app/services/suppliers-service/Dockerfile }
          - { name: integration,        context: app/services/integration-service, dockerfile: app/services/integration-service/Dockerfile }
          - { name: search-sync-worker, context: app/services/search-sync-worker,  dockerfile: app/services/search-sync-worker/Dockerfile }
          - { name: pdf-ingest-worker,  context: app/services/pdf-ingest-worker,   dockerfile: app/services/pdf-ingest-worker/Dockerfile }
          # migrate image bundles db/init SQL, so its build context is app/
          - { name: db-migrate,         context: app,                              dockerfile: app/services/db-migrate/Dockerfile }
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${REGISTRY}/${PROJECT}/${{ matrix.name }}"
          docker build -f "${{ matrix.dockerfile }}" -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" "${{ matrix.context }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"

  # Apply the schema/seed to RDS from inside the VPC (one-shot ECS task), wait for
  # it to finish, and fail the deploy if it errors.
  migrate:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run db-migrate task and wait
        run: |
          TASK_ARN=$(aws ecs run-task --cluster "$ECS_CLUSTER" \
            --task-definition "${PROJECT}-db-migrate" --launch-type EC2 \
            --count 1 --query 'tasks[0].taskArn' --output text)
          echo "migrate task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"
          CODE=$(aws ecs describe-tasks --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migrate exit code: $CODE"
          [ "$CODE" = "0" ] || { echo "::error::db migration failed"; exit 1; }

  # Force each service to redeploy so it pulls the freshly pushed :latest image.
  rollout:
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        name: [auth, catalog, search, inventory, orders, notification,
               suppliers, integration, search-sync-worker, pdf-ingest-worker]
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service --cluster "$ECS_CLUSTER" \
            --service "${PROJECT}-${{ matrix.name }}" \
            --force-new-deployment >/dev/null
          echo "rolled ${PROJECT}-${{ matrix.name }}"
