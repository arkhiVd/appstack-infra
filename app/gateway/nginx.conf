# Local gateway = AWS ALB path-routing + CloudFront/S3 origin, combined.
# Single origin for the SPA and all 8 services (no CORS). Path rules mirror the
# ALB listener rules in the ecs_compute module.
server {
    listen 80;
    client_max_body_size 25m;

    # ---- service routes (same prefixes the ALB targets) --------------------
    location /auth/         { proxy_pass http://auth-service:8080; }
    location /catalog/      { proxy_pass http://catalog-service:8080; }
    location /search        { proxy_pass http://search-service:8080; }
    location /inventory/    { proxy_pass http://inventory-service:8080; }
    location /orders/       { proxy_pass http://orders-service:8080; }
    location /notifications { proxy_pass http://notification-service:8080; }
    location /suppliers     { proxy_pass http://suppliers-service:8080; }
    location /integration/  { proxy_pass http://integration-service:8080; }

    # ---- CSV upload -> LocalStack S3 ingest bucket -------------------------
    # Stands in for a CloudFront/presigned-URL upload straight to S3. The
    # ObjectCreated event then drives the pdf-ingest pipeline.
    location /upload/ {
        proxy_pass http://localstack:4566/appstack-pdf-ingest/;
        proxy_set_header Host localstack:4566;
    }

    # ---- SPA (S3 + CloudFront origin) --------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;   # SPA fallback (CloudFront 403/404 -> index.html)
    }
}
